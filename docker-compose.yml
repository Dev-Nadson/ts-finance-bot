services:
  postgres:
    container_name: finance-bot-db
    image: postgres:18-alpine
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - finance_volume:/var/lib/postgresql/data

volumes:
  finance_volume:
