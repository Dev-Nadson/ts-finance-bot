services:
  postgres:
    container_name: finance-bot-db
    image: bitnami/postgresql:latest
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - finance_volume:/bitnami/postgresql

volumes:
  finance_volume:
