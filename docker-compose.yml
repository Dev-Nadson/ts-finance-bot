services:
  postgres:
    container_name: finance-bot-db
    image: bitnami/postgresql:latest
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      # bitnami/postgresql usa o prefixo POSTGRESQL_*, não POSTGRES_*.
      # POSTGRESQL_POSTGRES_PASSWORD define a senha do superusuário "postgres".
      - POSTGRESQL_POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRESQL_DATABASE=${DB_NAME}
    volumes:
      - finance_volume:/bitnami/postgresql

volumes:
  finance_volume:
